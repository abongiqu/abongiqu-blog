---
layout: default
---
<div>
  {% for post in site.posts %}
  <article style="padding: 1.5rem 0; border-bottom: 1px solid var(--light-line);">
    <h2 style="font-size: 1.2rem; font-weight: 400; margin-bottom: 0.3rem;">
      <a href="{{ post.url }}" style="color: var(--ink);">{{ post.title }}</a>
    </h2>
    <div style="font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem;">
      {{ post.date | date: "%Y-%m-%d" }}
      {% if post.tag %} · {{ post.tag }}{% endif %}
    </div>
    {% if post.excerpt %}
    <p style="font-size: 0.95rem; color: var(--muted);">{{ post.excerpt }}</p>
    {% endif %}
  </article>
  {% endfor %}

  {% if site.posts.size == 0 %}
  <p style="color: var(--muted); text-align: center; padding: 3rem 0;">এখনো কোনো লেখা নেই।</p>
  {% endif %}
</div>
